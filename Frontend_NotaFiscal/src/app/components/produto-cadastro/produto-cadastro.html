<div class="container mt-4">
  <h2>📦 Cadastro de Produtos (Estoque)</h2>

  <div class="card p-3 mb-4 shadow-sm caixa1">
    <div class="row g-3">
      <div class="col-md-3">
        <input type="text" class="form-control" placeholder="Código" [(ngModel)]="novoProduto.codigo">
      </div>
      <div class="col-md-5">
        <input type="text" class="form-control" placeholder="Descrição" [(ngModel)]="novoProduto.descricao">
      </div>
      <div class="col-md-2">
        <input type="number" class="form-control" placeholder="Saldo" [(ngModel)]="novoProduto.saldo"
          [(ngModel)]="novoProduto.saldo" min="1">
      </div>
      <div class="col-md-2">
        <button class="btn btn-success w-100" (click)="salvar()">Salvar</button>
      </div>
    </div>
  </div>

  <table class="table table-hover border tabela1">
    <thead class="table-dark">
      <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Saldo</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of produtos">
        <td>{{ p.codigo }}</td>
        <td>{{ p.descricao }}</td>
        <td>{{ p.saldo }}</td>
        <td>
          <button (click)="deletarProduto(p.id)"
            style="background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">
            Excluir
          </button>
      </tr>
    </tbody>
  </table>
</div>

<div *ngIf="produtos.length === 0" class="text-center mt-3 text-muted">
  <p>Nenhum produto encontrado no estoque.</p>
</div>
